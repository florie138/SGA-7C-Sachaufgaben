document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"604cb5bd-350c-4f48-9e1d-b68bb450e589\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}\n  html,body{margin:0;padding:0;}\n  body{background:var(--bg);}\n  :root{\n    --bg:#eef6f6; --bg-blur:rgba(238,246,246,.86);\n    --ink:#163b3c; --sub:#5e8284; --sub2:#365a5b; --ink2:#274b4c;\n    --line:#d3e9e8; --accent:#0e9aa3; --accent-strong:#0b7b83; --accent-soft:#ddf3f3;\n    --arrow:#9ec8c7; --chip-bg:#d5efef; --chip-fg:#0b7b83;\n    --heading:'Baloo 2','Newsreader',serif; --radius:20px;\n    --card-shadow:0 4px 16px rgba(14,154,163,.09); --hover-shadow:0 10px 26px rgba(14,154,163,.17);\n  }\n  [data-theme=\"schlicht\"]{\n    --bg:#f6f5f1; --bg-blur:rgba(246,245,241,.86);\n    --ink:#23282e; --sub:#6b7178; --sub2:#41474e; --ink2:#2c3138;\n    --line:#e6e3dc; --accent:#2563eb; --accent-strong:#1d4fd0; --accent-soft:#eef3fe;\n    --arrow:#c2bdb4; --chip-bg:#e7e9fb; --chip-fg:#3a44b8;\n    --heading:'Newsreader',serif; --radius:16px;\n    --card-shadow:none; --hover-shadow:0 8px 22px rgba(37,99,235,.10);\n  }\n  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div data-theme=\"{{ themeAttr }}\" style=\"min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Libre Franklin',sans-serif;-webkit-font-smoothing:antialiased;\">\n\n  <div style=\"position:sticky;top:0;z-index:10;background:var(--bg-blur);backdrop-filter:saturate(1.4) blur(8px);-webkit-backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--line);\">\n    <div style=\"max-width:880px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;gap:14px;min-height:60px;\">\n      <sc-if value=\"{{ notHome }}\" hint-placeholder-val=\"{{ false }}\">\n        <button onclick=\"{{ goHome }}\" style=\"border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:10px;height:42px;padding:0 16px;cursor:pointer;font-size:15px;font-weight:600;font-family:'Libre Franklin',sans-serif;display:inline-flex;align-items:center;gap:7px;\" style-hover=\"border-color:var(--accent);color:var(--accent);\">← Übersicht<\u002Fbutton>\n      <\u002Fsc-if>\n      <div style=\"font-family:var(--heading);font-size:21px;font-weight:600;\">Sachaufgaben<\u002Fdiv>\n      <div style=\"margin-left:auto;font-size:12.5px;font-weight:600;color:var(--sub);letter-spacing:.05em;text-transform:uppercase;\">Klasse 7<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:880px;margin:0 auto;padding:34px 24px 90px;\">\n\n    <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"animation:fadeUp .4s ease both;\">\n        <h1 style=\"font-family:var(--heading);font-weight:500;font-size:40px;line-height:1.12;margin:6px 0 14px;letter-spacing:-.01em;\">Sachaufgaben mit<br>Gleichungen lösen<\u002Fh1>\n        <p style=\"font-size:18px;line-height:1.55;color:var(--sub2);max-width:60ch;margin:0 0 34px;\">Aus einem Text wird eine Gleichung: Du legst fest, was <span style=\"font-style:italic;\">x<\u002Fspan> bedeutet, übersetzt jeden Satz in einen Term und löst. Lerne die zwei wichtigsten Aufgabentypen Schritt für Schritt – und übe anschließend mit beliebig vielen Aufgaben in drei Stufen.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:16px;\">\n\n          <button onclick=\"{{ openAlter }}\" style=\"display:flex;align-items:center;gap:20px;width:100%;text-align:left;background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;cursor:pointer;min-height:96px;font-family:'Libre Franklin',sans-serif;color:var(--ink);box-shadow:var(--card-shadow);transition:border-color .15s,transform .15s,box-shadow .15s;\" style-hover=\"border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--hover-shadow);\">\n            <span style=\"flex:0 0 auto;width:52px;height:52px;border-radius:14px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Newsreader',serif;font-size:28px;font-weight:500;font-style:italic;\">x+a<\u002Fspan>\n            <span style=\"flex:1;\">\n              <span style=\"display:block;font-family:var(--heading);font-size:21px;font-weight:600;margin-bottom:3px;\">Altersaufgaben<\u002Fspan>\n              <span style=\"display:block;font-size:14.5px;color:var(--sub);line-height:1.45;\">„In wie vielen Jahren …“ – Alter mit +x und −x beschreiben.<\u002Fspan>\n            <\u002Fspan>\n            <span style=\"margin-left:auto;color:var(--arrow);font-size:24px;\">→<\u002Fspan>\n          <\u002Fbutton>\n\n          <button onclick=\"{{ openVergleich }}\" style=\"display:flex;align-items:center;gap:20px;width:100%;text-align:left;background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;cursor:pointer;min-height:96px;font-family:'Libre Franklin',sans-serif;color:var(--ink);box-shadow:var(--card-shadow);transition:border-color .15s,transform .15s,box-shadow .15s;\" style-hover=\"border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--hover-shadow);\">\n            <span style=\"flex:0 0 auto;width:52px;height:52px;border-radius:14px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:26px;\">⇄<\u002Fspan>\n            <span style=\"flex:1;\">\n              <span style=\"display:block;font-family:var(--heading);font-size:21px;font-weight:600;margin-bottom:3px;\">Vergleichsaufgaben<\u002Fspan>\n              <span style=\"display:block;font-size:14.5px;color:var(--sub);line-height:1.45;\">Bäume, Tarife, Kerzen, Sparkonten …: wann sind zwei Größen gleich?<\u002Fspan>\n            <\u002Fspan>\n            <span style=\"margin-left:auto;color:var(--arrow);font-size:24px;\">→<\u002Fspan>\n          <\u002Fbutton>\n\n          <button onclick=\"{{ openGen }}\" style=\"display:flex;align-items:center;gap:20px;width:100%;text-align:left;background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;cursor:pointer;min-height:96px;font-family:'Libre Franklin',sans-serif;color:var(--ink);box-shadow:var(--card-shadow);transition:border-color .15s,transform .15s,box-shadow .15s;\" style-hover=\"border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--hover-shadow);\">\n            <span style=\"flex:0 0 auto;width:52px;height:52px;border-radius:14px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:26px;\">↻<\u002Fspan>\n            <span style=\"flex:1;\">\n              <span style=\"display:block;font-family:var(--heading);font-size:21px;font-weight:600;margin-bottom:3px;\">Aufgaben üben<\u002Fspan>\n              <span style=\"display:block;font-size:14.5px;color:var(--sub);line-height:1.45;\">Beliebig viele Aufgaben – leicht, mittel oder schwer.<\u002Fspan>\n            <\u002Fspan>\n            <span style=\"margin-left:auto;color:var(--arrow);font-size:24px;\">→<\u002Fspan>\n          <\u002Fbutton>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isAlter }}\">\n      <div style=\"animation:fadeUp .4s ease both;\">\n        <div style=\"font-size:12.5px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;\">Lehrgang<\u002Fdiv>\n        <h2 style=\"font-family:var(--heading);font-weight:500;font-size:32px;margin:0 0 14px;\">Altersaufgaben<\u002Fh2>\n        <p style=\"font-size:17px;line-height:1.6;color:var(--sub2);max-width:62ch;margin:0 0 4px;\">Bei Altersaufgaben ändert sich das Alter aller Personen gleich schnell. Der Trick: <strong>eine<\u002Fstrong> unbekannte Zahl als <span style=\"font-style:italic;\">x<\u002Fspan> festlegen und jedes Alter damit aufschreiben.<\u002Fp>\n        <div style=\"background:var(--accent-soft);border-radius:14px;padding:18px 20px;margin:22px 0 28px;\">\n          <div style=\"font-weight:700;color:var(--accent);font-size:13px;letter-spacing:.04em;margin-bottom:9px;\">MERKE<\u002Fdiv>\n          <ul style=\"margin:0;padding-left:18px;font-size:16px;line-height:1.7;color:var(--ink2);\">\n            <li>Lege fest, was <span style=\"font-style:italic;\">x<\u002Fspan> bedeutet (z. B. die Anzahl der Jahre).<\u002Fli>\n            <li>Schreibe jedes Alter mit <span style=\"font-style:italic;\">x<\u002Fspan> auf: heute, <strong>in<\u002Fstrong> <span style=\"font-style:italic;\">x<\u002Fspan> Jahren (<span style=\"font-style:italic;\">+x<\u002Fspan>), <strong>vor<\u002Fstrong> <span style=\"font-style:italic;\">x<\u002Fspan> Jahren (<span style=\"font-style:italic;\">−x<\u002Fspan>).<\u002Fli>\n            <li>Gleichung nach dem Text aufstellen, lösen und einen <strong>Antwortsatz<\u002Fstrong> schreiben.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div style=\"font-size:12.5px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:18px;\">Drei Beispiele – Schritt für Schritt<\u002Fdiv>\n        <div>{{ alterExamples }}<\u002Fdiv>\n        <div style=\"display:flex;gap:12px;flex-wrap:wrap;margin-top:32px;border-top:1px solid var(--line);padding-top:28px;\">\n          <button onclick=\"{{ gotoGenAlter }}\" style=\"border:none;cursor:pointer;background:var(--accent);color:#fff;border-radius:12px;padding:13px 22px;min-height:48px;font-family:'Libre Franklin',sans-serif;font-size:16px;font-weight:600;\" style-hover=\"background:var(--accent-strong);\">Jetzt selbst üben →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isVergleich }}\">\n      <div style=\"animation:fadeUp .4s ease both;\">\n        <div style=\"font-size:12.5px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;\">Lehrgang<\u002Fdiv>\n        <h2 style=\"font-family:var(--heading);font-weight:500;font-size:32px;margin:0 0 14px;\">Vergleichsaufgaben<\u002Fh2>\n        <p style=\"font-size:17px;line-height:1.6;color:var(--sub2);max-width:62ch;margin:0 0 4px;\">Zwei Größen verändern sich gleichmäßig – zwei Bäume wachsen, zwei Tarife werden teurer, zwei Kerzen brennen ab. Gesucht ist der Zeitpunkt, zu dem beide <strong>gleich groß<\u002Fstrong> sind. Dafür beschreibst du jede Größe als Term und setzt beide gleich.<\u002Fp>\n        <div style=\"background:var(--accent-soft);border-radius:14px;padding:18px 20px;margin:22px 0 28px;\">\n          <div style=\"font-weight:700;color:var(--accent);font-size:13px;letter-spacing:.04em;margin-bottom:9px;\">MERKE<\u002Fdiv>\n          <ul style=\"margin:0;padding-left:18px;font-size:16px;line-height:1.7;color:var(--ink2);\">\n            <li>Beschreibe jede Größe als Term: <strong>Startwert ± Veränderung · <span style=\"font-style:italic;\">x<\u002Fspan><\u002Fstrong>.<\u002Fli>\n            <li>„Gleich groß“ heißt: beide Terme <strong>gleichsetzen<\u002Fstrong>.<\u002Fli>\n            <li>Gleichung lösen und <span style=\"font-style:italic;\">x<\u002Fspan> einsetzen, um den <strong>gemeinsamen Wert<\u002Fstrong> zu bestimmen.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div style=\"font-size:12.5px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:18px;\">Drei Beispiele – Schritt für Schritt<\u002Fdiv>\n        <div>{{ vergleichExamples }}<\u002Fdiv>\n        <div style=\"display:flex;gap:12px;flex-wrap:wrap;margin-top:32px;border-top:1px solid var(--line);padding-top:28px;\">\n          <button onclick=\"{{ gotoGenVergleich }}\" style=\"border:none;cursor:pointer;background:var(--accent);color:#fff;border-radius:12px;padding:13px 22px;min-height:48px;font-family:'Libre Franklin',sans-serif;font-size:16px;font-weight:600;\" style-hover=\"background:var(--accent-strong);\">Jetzt selbst üben →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isGen }}\">\n      <div style=\"animation:fadeUp .4s ease both;\">{{ genBody }}<\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;theme&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;verspielt&quot;,&quot;schlicht&quot;],&quot;default&quot;:&quot;verspielt&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Darstellung&quot;},\n  &quot;mathStyle&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;serif&quot;,&quot;sans&quot;],&quot;default&quot;:&quot;serif&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Darstellung&quot;},\n  &quot;showTips&quot;: {&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},\n  &quot;withProbe&quot;: {&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},\n  &quot;startTab&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Übersicht&quot;,&quot;Altersaufgaben&quot;,&quot;Vergleichsaufgaben&quot;,&quot;Üben&quot;],&quot;default&quot;:&quot;Übersicht&quot;,&quot;tsType&quot;:&quot;string&quot;}\n}\">\nclass Component extends DCLogic {\n  C = { bg:'var(--bg)', card:'#ffffff', ink:'var(--ink)', sub:'var(--sub)', line:'var(--line)', accent:'var(--accent)', accentSoft:'var(--accent-soft)', ok:'#16a34a', warn:'#b45309', tip:'var(--sub)' };\n  NAMES = ['Lena','Jonas','Mia','Paul','Emma','Ben','Sophie','Lukas','Marie','Finn','Hannah','Noah','Lara','Tim','Anna','Elias','Nora','Jan'];\n  RELS = ['Vater','Mutter','Onkel','Tante','Opa','Oma'];\n\n  state = {\n    screen: this.initialScreen(),\n    exA: [0,0,0],\n    exV: [0,0,0],\n    type: 'alter',\n    diff: 'leicht',\n    task: this.initialScreen() === 'gen' ? this.gen('alter','leicht') : null,\n    revealed: false,\n    check: null,\n    solved: 0,\n  };\n\n  initialScreen(){\n    const m = { 'Altersaufgaben':'alter', 'Vergleichsaufgaben':'vergleich', 'Üben':'gen' };\n    return m[this.props && this.props.startTab] || 'home';\n  }\n\n  /* ---------- handlers ---------- */\n  goHome = () => this.setState({ screen:'home' });\n  openAlter = () => this.setState({ screen:'alter', exA:[0,0,0] });\n  openVergleich = () => this.setState({ screen:'vergleich', exV:[0,0,0] });\n  openGen = () => this.setState(s => ({ screen:'gen', task: s.task || this.gen(s.type, s.diff), revealed:false, check:null }));\n  exNext = (kind,i) => this.setState(s => { const key=kind==='alter'?'exA':'exV'; const arr=s[key].slice(); arr[i]=arr[i]+1; return { [key]:arr }; });\n  exReset = (kind,i) => this.setState(s => { const key=kind==='alter'?'exA':'exV'; const arr=s[key].slice(); arr[i]=0; return { [key]:arr }; });\n  gotoGenAlter = () => this.setState({ screen:'gen', type:'alter', diff:'leicht', task:this.gen('alter','leicht'), revealed:false, check:null });\n  gotoGenVergleich = () => this.setState({ screen:'gen', type:'vergleich', diff:'leicht', task:this.gen('vergleich','leicht'), revealed:false, check:null });\n  h_genNew = () => this.setState(s => ({ task:this.gen(s.type, s.diff), revealed:false, check:null }));\n  h_genReveal = () => this.setState({ revealed:true });\n  h_setType = (t) => this.setState(s => ({ type:t, task:this.gen(t, s.diff), revealed:false, check:null }));\n  h_setDiff = (d) => this.setState(s => ({ diff:d, task:this.gen(s.type, d), revealed:false, check:null }));\n  h_genCheck = (ok) => this.setState(s => ({ check: ok ? 'right' : 'wrong', solved: ok ? s.solved + 1 : s.solved }));\n\n  gen(type, diff){ return type === 'alter' ? this.genAlter(diff) : this.genVergleich(diff); }\n\n  /* ---------- number helpers ---------- */\n  rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }\n  pick(a){ return a[Math.floor(Math.random()*a.length)]; }\n  num(n){\n    if(typeof n!=='number') return String(n);\n    let s = (Math.round(n*1000)/1000).toString();\n    return s.replace('.', ',').replace('-', '−');\n  }\n  poss(name){ return name + (/[sxzß]$/.test(name) ? '’' : 's'); }\n  kWord(k){ return ({2:'doppelt so alt',3:'dreimal so alt',4:'viermal so alt',5:'fünfmal so alt'})[k] || (k+'-mal so alt'); }\n  term(S,R){ const a=Math.abs(R); const core = a===1 ? 'x' : this.num(a)+'·x'; return this.num(S)+' '+(R<0?'−':'+')+' '+core; }\n  cterm(c){ return c===1 ? 'x' : this.num(c)+'·x'; }\n\n  /* ---------- ALTER builders ---------- */\n  buildAgeMultiple(youngName, youngAge, olderName, olderAge, k){\n    const x = (olderAge - k*youngAge)/(k-1);\n    const ky = k*youngAge;\n    const steps = [\n      {label:'Was suchen wir? (Variable festlegen)', eqs:['x = Anzahl der Jahre'], tip:'Gesucht ist die Anzahl der Jahre, die vergehen. Dafür schreiben wir x.'},\n      {label:'Beide Alter in x Jahren aufschreiben', eqs:[olderName+': '+this.num(olderAge)+' + x', youngName+': '+this.num(youngAge)+' + x'], tip:'In x Jahren ist jede Person um x Jahre älter. Also einfach + x an das heutige Alter.'},\n      {label:'Gleichung aufstellen', eqs:[this.num(olderAge)+' + x = '+this.num(k)+' · ('+this.num(youngAge)+' + x)'], tip:'„'+this.kWord(k)+'“ heißt: das '+(k===2?'Doppelte':this.num(k)+'-fache')+' nehmen. Das Alter von '+olderName+' soll so groß sein wie das '+(k===2?'Doppelte':this.num(k)+'-fache')+' von '+youngName+'.'},\n      {label:'Klammer ausmultiplizieren', eqs:[this.num(olderAge)+' + x = '+this.num(ky)+' + '+this.num(k)+'·x'], tip:this.num(k)+' · ('+this.num(youngAge)+' + x) = '+this.num(k)+'·'+this.num(youngAge)+' + '+this.num(k)+'·x = '+this.num(ky)+' + '+this.num(k)+'·x.'},\n    ];\n    if(k-1===1){\n      steps.push({label:'x-Glieder und Zahlen sortieren – fertig!', eqs:[this.num(olderAge)+' − '+this.num(ky)+' = '+this.num(k)+'·x − x', this.num(olderAge-ky)+' = x'], tip:'Alle x nach rechts, alle Zahlen nach links. '+this.num(k)+'·x − x = x.'});\n    } else {\n      steps.push({label:'x-Glieder und Zahlen sortieren', eqs:[this.num(olderAge)+' − '+this.num(ky)+' = '+this.num(k)+'·x − x', this.num(olderAge-ky)+' = '+this.num(k-1)+'·x'], tip:'Alle x nach rechts, alle Zahlen nach links. '+this.num(k)+'·x − x = '+this.num(k-1)+'·x.'});\n      steps.push({label:'Durch die Zahl vor dem x teilen', eqs:['x = '+this.num(olderAge-ky)+' : '+this.num(k-1)+' = '+this.num(x)], tip:'Beide Seiten durch '+this.num(k-1)+' teilen, dann steht x allein.'});\n    }\n    if(this.withProbe()){\n      steps.push({label:'Probe – stimmt es?', eqs:[this.num(olderAge)+' + '+this.num(x)+' = '+this.num(olderAge+x), this.num(k)+' · ('+this.num(youngAge)+' + '+this.num(x)+') = '+this.num(k)+' · '+this.num(youngAge+x)+' = '+this.num(k*(youngAge+x)), this.num(olderAge+x)+' = '+this.num(k*(youngAge+x))+'   ✓'], tip:'x in beide Alter einsetzen: ist '+olderName+' dann wirklich '+this.kWord(k).replace(' so alt','')+' so alt wie '+youngName+'? Ja.'});\n    }\n    return {\n      kind:'alter',\n      story: olderName+' ist '+this.num(olderAge)+' Jahre alt und '+youngName+' ist '+this.num(youngAge)+' Jahre alt.',\n      ask: 'Bestimme, nach wie vielen Jahren '+olderName+' '+this.kWord(k)+' ist wie '+youngName+'.',\n      steps,\n      answer: 'Nach '+this.num(x)+' Jahren ist '+olderName+' '+this.kWord(k)+' wie '+youngName+' ('+this.num(olderAge+x)+' Jahre und '+this.num(youngAge+x)+' Jahre).',\n    };\n  }\n\n  buildAgeTogether(nameA, ageA, nameB, ageB, rel, parentAge){\n    const x = parentAge - ageA - ageB;\n    const sum = ageA + ageB;\n    const steps = [\n      {label:'Was suchen wir? (Variable festlegen)', eqs:['x = Anzahl der Jahre'], tip:'Gesucht ist die Anzahl der Jahre. Dafür schreiben wir x.'},\n      {label:'Alle Alter in x Jahren aufschreiben', eqs:[nameA+': '+this.num(ageA)+' + x', nameB+': '+this.num(ageB)+' + x', rel+': '+this.num(parentAge)+' + x'], tip:'In x Jahren ist jede Person um x Jahre älter – auch '+rel.toLowerCase()+'.'},\n      {label:'Gleichung aufstellen', eqs:['('+this.num(ageA)+' + x) + ('+this.num(ageB)+' + x) = '+this.num(parentAge)+' + x'], tip:nameA+' und '+nameB+' „zusammen“ heißt: ihre beiden Alter addieren. Das soll so groß sein wie das Alter '+(rel==='Mutter'||rel==='Oma'||rel==='Tante'?'der ':'des ')+rel+'.'},\n      {label:'Linke Seite zusammenfassen', eqs:[this.num(sum)+' + 2·x = '+this.num(parentAge)+' + x'], tip:this.num(ageA)+' + '+this.num(ageB)+' = '+this.num(sum)+', und x + x = 2·x.'},\n      {label:'x-Glieder und Zahlen sortieren – fertig!', eqs:['2·x − x = '+this.num(parentAge)+' − '+this.num(sum), 'x = '+this.num(x)], tip:'Alle x nach links, alle Zahlen nach rechts. 2·x − x = x.'},\n    ];\n    if(this.withProbe()){\n      steps.push({label:'Probe – stimmt es?', eqs:['('+this.num(ageA)+'+'+this.num(x)+') + ('+this.num(ageB)+'+'+this.num(x)+') = '+this.num(ageA+ageB+2*x), this.num(parentAge)+' + '+this.num(x)+' = '+this.num(parentAge+x), this.num(ageA+ageB+2*x)+' = '+this.num(parentAge+x)+'   ✓'], tip:'x einsetzen: sind beide zusammen wirklich so alt wie '+(rel==='Mutter'||rel==='Oma'||rel==='Tante'?'die ':'der ')+rel+'? Ja.'});\n    }\n    return {\n      kind:'alter',\n      story: nameA+' ist heute '+this.num(ageA)+' Jahre alt, '+nameB+' ist '+this.num(ageB)+' Jahre alt und '+(rel==='Mutter'||rel==='Oma'||rel==='Tante'?'die ':'der ')+rel+' der beiden ist '+this.num(parentAge)+' Jahre alt.',\n      ask: 'Bestimme, in wie vielen Jahren '+nameA+' und '+nameB+' zusammen so alt sind wie '+(rel==='Mutter'||rel==='Oma'||rel==='Tante'?'ihre ':'ihr ')+rel+'.',\n      steps,\n      answer: 'Nach '+this.num(x)+' Jahren sind '+nameA+' und '+nameB+' zusammen so alt wie '+(rel==='Mutter'||rel==='Oma'||rel==='Tante'?'ihre ':'ihr ')+rel+' ('+this.num(ageA+x)+' + '+this.num(ageB+x)+' = '+this.num(parentAge+x)+' Jahre).',\n    };\n  }\n\n  buildAgeWasWill(name, p, k, q){\n    const W = (k*q + p)/(k-1);\n    const kq = k*q;\n    const steps = [\n      {label:'Was suchen wir? (Variable festlegen)', eqs:['x = heutiges Alter von '+name], tip:'Gesucht ist das heutige Alter. Dafür schreiben wir x.'},\n      {label:'„in\" und „vor\" aufschreiben', eqs:['in '+this.num(p)+' Jahren:  x + '+this.num(p), 'vor '+this.num(q)+' Jahren:  x − '+this.num(q)], tip:'„In '+this.num(p)+' Jahren\" heißt + '+this.num(p)+', „vor '+this.num(q)+' Jahren\" heißt − '+this.num(q)+'.'},\n      {label:'Gleichung aufstellen', eqs:['x + '+this.num(p)+' = '+this.num(k)+' · (x − '+this.num(q)+')'], tip:'In '+this.num(p)+' Jahren soll das Alter '+this.kWord(k)+' sein wie vor '+this.num(q)+' Jahren – also das '+(k===2?'Doppelte':this.num(k)+'-fache')+'.'},\n      {label:'Klammer ausmultiplizieren', eqs:['x + '+this.num(p)+' = '+this.num(k)+'·x − '+this.num(kq)], tip:this.num(k)+' · (x − '+this.num(q)+') = '+this.num(k)+'·x − '+this.num(k)+'·'+this.num(q)+' = '+this.num(k)+'·x − '+this.num(kq)+'.'},\n      {label:'x-Glieder und Zahlen sortieren', eqs:[this.num(p)+' + '+this.num(kq)+' = '+this.num(k)+'·x − x', this.num(p+kq)+' = '+this.num(k-1)+'·x'], tip:'Alle x nach rechts, alle Zahlen nach links. '+this.num(k)+'·x − x = '+this.num(k-1)+'·x.'},\n      {label:'Durch die Zahl vor dem x teilen', eqs:['x = '+this.num(p+kq)+' : '+this.num(k-1)+' = '+this.num(W)], tip:'Beide Seiten durch '+this.num(k-1)+' teilen, dann steht x allein.'},\n    ];\n    if(this.withProbe()){\n      steps.push({label:'Probe – stimmt es?', eqs:[this.num(W)+' + '+this.num(p)+' = '+this.num(W+p), this.num(k)+' · ('+this.num(W)+' − '+this.num(q)+') = '+this.num(k)+' · '+this.num(W-q)+' = '+this.num(k*(W-q)), this.num(W+p)+' = '+this.num(k*(W-q))+'   ✓'], tip:'Heutiges Alter '+this.num(W)+' einsetzen – in '+this.num(p)+' Jahren ('+this.num(W+p)+') ist es '+this.kWord(k).replace(' so alt','')+' so groß wie vor '+this.num(q)+' Jahren ('+this.num(W-q)+'). Stimmt.'});\n    }\n    return {\n      kind:'alter',\n      story: 'In '+this.num(p)+' Jahren wird '+name+' '+this.kWord(k)+' sein, wie '+name+' vor '+this.num(q)+' Jahren war.',\n      ask: 'Bestimme mithilfe einer Gleichung, wie alt '+name+' heute ist.',\n      steps,\n      answer: name+' ist heute '+this.num(W)+' Jahre alt.',\n    };\n  }\n\n  buildAgeSum(yName, oName, mode, val, s){\n    let x, oExpr, sumEq, combine, exprTip, storyRel, oAge;\n    const steps = [\n      {label:'Was suchen wir? (Variable festlegen)', eqs:['x = Alter von '+yName], tip:'Wir nennen das gesuchte Alter von '+yName+' kurz x. Alles andere drücken wir damit aus.'},\n    ];\n    if(mode === 'add'){\n      x = (s - val)/2; oAge = x + val;\n      oExpr = 'x + '+this.num(val);\n      sumEq = 'x + (x + '+this.num(val)+') = '+this.num(s);\n      combine = '2·x + '+this.num(val)+' = '+this.num(s);\n      exprTip = '„'+this.num(val)+' Jahre älter\" heißt: '+yName+'s Alter + '+this.num(val)+'.';\n      storyRel = oName+' ist '+this.num(val)+' Jahre älter als '+yName+'.';\n      steps.push({label:'Das andere Alter mit x ausdrücken', eqs:[oName+': '+oExpr], tip:exprTip});\n      steps.push({label:'Gleichung aufstellen', eqs:[sumEq], tip:'„Zusammen '+this.num(s)+' Jahre alt\" heißt: beide Alter addieren.'});\n      steps.push({label:'Zusammenfassen', eqs:[combine], tip:'x + x = 2·x. Die '+this.num(val)+' bleibt stehen.'});\n      steps.push({label:'Nach x auflösen – fertig!', eqs:['2·x = '+this.num(s-val), 'x = '+this.num(x)], tip:'Erst − '+this.num(val)+' auf beiden Seiten, dann durch 2 teilen.'});\n    } else {\n      x = s/(val+1); oAge = val*x;\n      oExpr = this.num(val)+'·x';\n      sumEq = 'x + '+this.num(val)+'·x = '+this.num(s);\n      combine = this.num(val+1)+'·x = '+this.num(s);\n      exprTip = '„'+this.kWord(val)+'\" heißt: das '+this.num(val)+'-fache von '+yName+'s Alter, also '+this.num(val)+'·x.';\n      storyRel = oName+' ist '+this.kWord(val)+' wie '+yName+'.';\n      steps.push({label:'Das andere Alter mit x ausdrücken', eqs:[oName+': '+oExpr], tip:exprTip});\n      steps.push({label:'Gleichung aufstellen', eqs:[sumEq], tip:'„Zusammen '+this.num(s)+' Jahre alt\" heißt: beide Alter addieren.'});\n      steps.push({label:'Zusammenfassen', eqs:[combine], tip:'x + '+this.num(val)+'·x = '+this.num(val+1)+'·x.'});\n      steps.push({label:'Durch die Zahl vor dem x teilen – fertig!', eqs:['x = '+this.num(s)+' : '+this.num(val+1)+' = '+this.num(x)], tip:'Beide Seiten durch '+this.num(val+1)+' teilen.'});\n    }\n    if(this.withProbe()){\n      steps.push({label:'Probe – stimmt es?', eqs:[this.num(x)+' + '+this.num(oAge)+' = '+this.num(x+oAge)+'   ✓'], tip:'Beide Alter zusammen ergeben wieder '+this.num(s)+'.'});\n    }\n    return {\n      kind:'alter',\n      story: storyRel+' Zusammen sind sie '+this.num(s)+' Jahre alt.',\n      ask: 'Bestimme, wie alt '+yName+' und '+oName+' jeweils sind.',\n      steps,\n      answer: yName+' ist '+this.num(x)+' Jahre alt und '+oName+' ist '+this.num(oAge)+' Jahre alt.',\n    };\n  }\n\n  buildAgePastMultiple(yName, yAge, oName, oAge, k){\n    const x = (k*yAge - oAge)/(k-1);\n    const ky = k*yAge;\n    const steps = [\n      {label:'Was suchen wir? (Variable festlegen)', eqs:['x = Anzahl der Jahre (her)'], tip:'Gesucht ist, wie viele Jahre es her ist. Dafür schreiben wir x.'},\n      {label:'Beide Alter „vor x Jahren\" aufschreiben', eqs:[oName+': '+this.num(oAge)+' − x', yName+': '+this.num(yAge)+' − x'], tip:'„Vor x Jahren\" heißt: x Jahre jünger, also − x.'},\n      {label:'Gleichung aufstellen', eqs:[this.num(oAge)+' − x = '+this.num(k)+' · ('+this.num(yAge)+' − x)'], tip:'Damals war '+oName+' '+this.kWord(k)+' wie '+yName+' – also das '+this.num(k)+'-fache.'},\n      {label:'Klammer ausmultiplizieren', eqs:[this.num(oAge)+' − x = '+this.num(ky)+' − '+this.num(k)+'·x'], tip:this.num(k)+' · ('+this.num(yAge)+' − x) = '+this.num(ky)+' − '+this.num(k)+'·x.'},\n      {label:'x-Glieder und Zahlen sortieren', eqs:[this.num(k)+'·x − x = '+this.num(ky)+' − '+this.num(oAge), this.num(k-1)+'·x = '+this.num(ky-oAge)], tip:'Alle x auf eine Seite (+ '+this.num(k)+'·x und − x), die Zahlen auf die andere.'},\n      {label:'Durch die Zahl vor dem x teilen', eqs:['x = '+this.num(ky-oAge)+' : '+this.num(k-1)+' = '+this.num(x)], tip:'Beide Seiten durch '+this.num(k-1)+' teilen.'},\n    ];\n    if(this.withProbe()){\n      steps.push({label:'Probe – stimmt es?', eqs:[this.num(oAge)+' − '+this.num(x)+' = '+this.num(oAge-x), this.num(k)+' · ('+this.num(yAge)+' − '+this.num(x)+') = '+this.num(k)+' · '+this.num(yAge-x)+' = '+this.num(k*(yAge-x)), this.num(oAge-x)+' = '+this.num(k*(yAge-x))+'   ✓'], tip:'x einsetzen: war '+oName+' vor '+this.num(x)+' Jahren wirklich '+this.kWord(k).replace(' so alt','')+' so alt? Ja.'});\n    }\n    return {\n      kind:'alter',\n      story: oName+' ist heute '+this.num(oAge)+' Jahre alt und '+yName+' ist '+this.num(yAge)+' Jahre alt.',\n      ask: 'Bestimme, vor wie vielen Jahren '+oName+' '+this.kWord(k)+' war wie '+yName+'.',\n      steps,\n      answer: 'Vor '+this.num(x)+' Jahren war '+oName+' '+this.kWord(k)+' wie '+yName+' ('+this.num(oAge-x)+' Jahre und '+this.num(yAge-x)+' Jahre).',\n    };\n  }\n\n  /* ---------- VERGLEICH builders ----------\n     Jeder Kontext beschreibt sich selbst (Story + Phrasenbausteine) UND sein\n     Zahlenprofil (dir, Raten, Startwerte, erlaubte Stufen). buildVergleich baut\n     Frage/Antwort generisch aus subj/eq/vb. So lässt sich der Pool beliebig erweitern. */\n  ctxMap(){\n    const n = (v)=>this.num(v);\n    return {\n      // ---- Wachsen: Höhe (cm) ----\n      baeume: { dir:1, levels:['leicht','mittel','schwer'], rateInt:[2,3,4,5,6,8,10,12], rateDec:[], starts:[20,30,40,50,60,70,80,90,100,120,150], convFactor:100, convUnit:'m',\n        q1:'Tanne', q2:'Eiche', tn:'Jahren', xLabel:' ie andere. Hier steht dann direkt x = '+this.num(rhs)+'.'});\n    } else {\n      steps.push({label:'x-Werte auf eine Seite, Zahlen auf die andere', eqs:[this.cterm(c)+' = '+this.num(rhs)], tip:'Alle x auf eine Seite, alle Zahlen auf die andere. Übrig bleibt (Zahl)·x = (Zahl).'});\n      steps.push({label:'Durch die Zahl vor dem x teilen', eqs:['x = '+this.num(rhs)+' : '+this.num(c)+' = '+this.num(x)], tip:'Beide Seiten durch '+this.num(c)+' teilen – dann steht x allein.'});\n    }\n    let answer;\n    if(opts.parts === 1){\n      answer = 'Nach '+this.num(x)+' '+tn+' '+phraseFront+'.';\n    } else {\n      steps.push({label:'Welchen Wert haben beide nach '+this.num(x)+' '+tn+'? ('+ctx.valWord+')', eqs:[this.num(S1)+' '+(R1<0?'−':'+')+' '+this.num(Math.abs(R1))+'·'+this.num(x)+' = '+this.num(v)+' '+ctx.unit], tip:'Den gefundenen x-Wert in einen der beiden Terme einsetzen – das ist der gemeinsame Wert.'});\n      answer = 'Nach '+this.num(x)+' '+tn+' '+phraseFront+' – '+ctx.valPre+' '+this.num(v)+' '+ctx.unit+'.';\n    }\n    return {\n      kind:'vergleich',\n      story: opts.storyOverride || ctx.story(S1, Math.abs(R1), S2, Math.abs(R2)),\n      ask: opts.parts === 1\n        ? 'Bestimme, nach wie vielen '+tn+' '+phraseEnd+'.'\n        : 'Bestimme, nach wie vielen '+tn+' '+phraseEnd+', und gib an, '+ctx.valQ+'.',\n      steps,\n      answer: answer,\n    };\n  }\n\n  /* ---------- random generators ---------- */\n  genAlter(diff){\n    if(diff === 'leicht'){\n      // kein Zeitfaktor: zwei Personen heute, eine Gleichung ohne Klammern\n      let yn = this.pick(this.NAMES), on = this.pick(this.NAMES);\n      while(on === yn) on = this.pick(this.NAMES);\n      if(this.pick([0,1]) === 0){\n        const d = this.rnd(3,12), x = this.rnd(7,20), s = 2*x + d;\n        return this.buildAgeSum(yn, on, 'add', d, s);\n      }\n      const k = this.pick([2,3]), x = this.rnd(6,16), s = (k+1)*x;\n      return this.buildAgeSum(yn, on, 'mul', k, s);\n    }\n    if(diff === 'mittel'){\n      // Zeitfaktor + Klammer: „in x Jahren …“ oder „zusammen so alt wie …“\n      if(this.pick([0,1]) === 0){\n        for(let i=0;i<200;i++){\n          const y = this.rnd(9,16), k = this.pick([2,3]), x = this.rnd(3,14);\n          const o = k*y + (k-1)*x;\n          if(o > y && o <= 85){\n            const yn = this.pick(this.NAMES), rel = this.pick(['Vater','Mutter','Onkel','Tante','Opa','Oma']);\n            return this.buildAgeMultiple(yn, y, this.poss(yn)+' '+rel, o, k);\n          }\n        }\n      } else {\n        for(let i=0;i<200;i++){\n          const a = this.rnd(7,16), b = this.rnd(7,16), x = this.rnd(3,14), c = a + b + x;\n          if(c <= 80){\n            let na = this.pick(this.NAMES), nb = this.pick(this.NAMES);\n            while(nb === na) nb = this.pick(this.NAMES);\n            return this.buildAgeTogether(na, a, nb, b, this.pick(['Mutter','Vater']), c);\n          }\n        }\n      }\n      return this.buildAgeMultiple('Elvira', 14, 'Elviras Vater', 43, 2);\n    }\n    // schwer: gemischte Zeit, gesuchtes heutiges Alter / „vor wie vielen Jahren …“\n    if(this.pick([0,1]) === 0){\n      for(let i=0;i<300;i++){\n        const k = this.pick([2,3,4]), W = this.rnd(28,74), q = this.rnd(10,45);\n        if(q >= W - 4) continue;\n        const p = W*(k-1) - k*q;\n        if(p >= 4 && p <= 40) return this.buildAgeWasWill(this.pick(this.NAMES), p, k, q);\n      }\n    } else {\n      for(let i=0;i<300;i++){\n        const k = this.pick([3,4,5]), y = this.rnd(8,18), x = this.rnd(2, Math.max(2, y-2));\n        const o = k*y - (k-1)*x;\n        if(o > y && o <= 90 && (y - x) >= 2){\n          const yn = this.pick(this.NAMES), rel = this.pick(['Vater','Mutter','Onkel','Tante','Opa','Oma']);\n          return this.buildAgePastMultiple(yn, y, this.poss(yn)+' '+rel, o, k);\n        }\n      }\n    }\n    return this.buildAgeWasWill('Wolfgang', 8, 4, 46);\n  }\n\n  genVergleich(diff){\n    const parts = diff === 'leicht' ? 1 : 2;\n    const xmin = continue;\n      if(Math.abs(v*10 - Math.round(v*10)) > 1e-9) continue;\n\n      this._lastV = ctx.key;\n      const opts = { parts };\n      if(conv){ opts.conv = conv; opts.storyOverride = storyOverride; }\n      return this.buildVergleich(ctx, S1, R1, S2, R2, opts);\n    }\n    return this.buildVergleich(this.ctxMap().baeume, 80, 5, 50, 11, { parts });\n  }\n\n  /* ---------- fixed examples ---------- */\n  examplesAlter(){ return [\n    this.buildAgeSum('Mia', 'Jonas', 'add', 7, 33),\n    this.buildAgeMultiple('Elvira', 14, 'Elviras Vater', 43, 2),\n    this.buildAgeWasWill('Wolfgang', 8, 4, 46),\n  ]; }\n  examplesVergleich(){ return [\n    this.buildVergleich('konto', 80, 5, 50, 11, {parts:1}),\n    this.buildVergleich('badewanne', 20, 0.6, 10, 1.6, {parts:2}),\n    this.buildVergleich('baeume', 250, 12, 85, 45, {\n      parts:2,\n      conv:{ eq:'2,50 m = 250 cm', tip:'Die Höhen sind in verschiedenen Einheiten angegeben. Rechne zuerst alles in cm um: 2,50 m · 100 = 250 cm.' },\n      storyOverride:'Eine Tanne ist 2,50 m hoch und wächst pro Jahr um etwa 12 cm. Eine Eiche ist 85 cm hoch und wächst pro Jahr um etwa 45 cm.'\n    }),\n  ]; }\n\n  /* ---------- prop helpers ---------- */\n  withProbe(){ return !(this.props && this.props.withProbe === false); }\n  showTips(){ return !(this.props && this.props.showTips === false); }\n  themeAttr(){ return (this.props && this.props.theme === 'schlicht') ? 'schlicht' : 'verspielt'; }\n  mathFont(){ return (this.props && this.props.mathStyle === 'sans') ? \"'Libre Franklin',sans-serif\" : \"'Newsreader',serif\"; }\n\n  /* ---------- difficulty color coding ---------- */\n  diffColor(d){\n    const map = {\n      // bg = Pille/Antwortbox, fg = Text/Akzent, dot = Punkt, tint = Kartenfläche, border = Kartenrand\n      leicht: { bg:'#d8eede', fg:'#2f7d4f', dot:'#7cc79a', tint:'#f1f9f4', border:'#cfe8d8' },   // pastellgrün\n      mittel: { bg:'#fbe7cd', fg:'#b56a14', dot:'#f0b667', tint:'#fdf6ec', border:'#f3e1c4' },   // p ) ? h('div',{style:{marginTop:'10px',fontSize:'14px',color:C.sub,fontFamily:\"'Libre Franklin',sans-serif\",lineHeight:1.5}}, step.tip) : null\n      )\n    );\n  }\n  stepsList(steps,count,theme){\n    const h=React.createElement;\n    return h('div',{style:{display:'flex',flexDirection:'column',gap:'12px'}}, steps.slice(0,count).map((s,i)=>this.stepCard(s,i+1,theme)));\n  }\n  questionCard(task,big,theme){\n    const C=this.C, h=React.createElement, t=theme||this.diffColor();\n    return h('div',{style:{background:t.tint,border:'1px solid '+t.border,borderLeft:'5px solid '+t.fg,borderRadius:'16px',padding:big?'26px 26px':'22px 24px',paddingLeft:(big?26:24)-4+'px'}},\n      h('p',{style:{margin:'0 0 14px',fontSize:big?'18px':'17px',lineHeight:1.6,color:C.ink,fontFamily:\"'Libre Franklin',sans-serif\"}}, task.story),\n      h('div',{style:{display:'flex',gap:'9px',alignItems:'flex-start'}},\n        h('span',{style:{color:t.fg,fontWeight:700,fontSize:'16px',lineHeight:1.5}}, '→'),\n        h('span',{style:{fontSize:'16px',fontWeight:600,color:C.ink,lineHeight:1.5,fontFamily:\"'Libre Franklin',sans-serif\"}}, task.ask)));\n  }\n  answerBox(task,theme){\n    const C=this.C, h=React.createElement, t=theme||this.diffColor();\n    return h('div',{style:{background:t.bg,border:'1px solid '+t.border,borderRadius:'12px',padding:'16px 20px',display:'flex',gap:'14px',alignItems:'baseline',flexWrap:'wrap'}},\n      h('span',{style:{fontSize:'13px',fontWeight:700,color:t.fg,fontFamily:\"'Libre Franklin',sans-serif\",textTransform:'uppercase',letterSpacing:'.04em'}}, 'Antwort'),\n      h('span',{style:{fontSize:'17px',color:C.ink,fontFamily:\"'Libre Franklin',sans-serif\",lineHeight:1.5,fontWeight:500}}, task.answer));\n  }\n\n  renderExamples(kind){\n    const C=this.C, h=React.createElement, st=this.state;\n    const tasks = kind==='alter' ? this.examplesAlter() : this.examplesVergleich();\n    const diffs=['leicht','mittel','schwer'];\n    const key = kind==='alter' ? 'exA' : ew,style:{...primaryBtn},title:'Neue Aufgabe'},'↻  Neue Aufgabe')\n    );\n\n    if(!task) return h('div',null, controls);\n\n    let body;\n    if(!st.revealed){\n      body=h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'14px',marginTop:'18px'}},\n        h('div',{style:{fontSize:'14.5px',color:C.tip,fontFamily:\"'Libre Franklin',sans-serif\",textAlign:'center'}},'Rechne die Aufgabe zuerst selbst. Dann aufdecken und vergleichen.'),\n        h('button',{onClick:this.h_genReveal,style:{...primaryBtn}},'Lösung anzeigen'));\n    } else {\n      const checkBtn=(color)=>({border:'1px solid '+color+'55',background:'#fff',color:color,borderRadius:'10px',padding:'10px 18px',minHeight:'44px',cursor:'pointer',fontFamily:\"'Libre Franklin',sans-serif\",fontSize:'15px',fontWeight:600});\n      const selfCheck = st.check\n        ? h('div',{style:{display:'flex',alignItems:'center',gap:'8px',fontFamily:\"'Libre Franklin',sans-serif\",fontSize:'15px',fontWeight:600,color: st.check==='right'?C.ok:C.warn}}, st.check==='right' ? '✓ Super – richtig gelöst!' : 'Kein Problem – schau dir die Schritte noch einmal an und probiere eine neue Aufgabe.')\n        : h('div',{style:{display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap'}},\n            h('span',{style:{fontSize:'15px',color:C.sub,fontFamily:\"'Libre Franklin',sans-serif\"}},'Hattest du es richtig?'),\n            h('button',{onClick:()=>this.h_genCheck(true),style:checkBtn(C.ok)},'✓ Ja'),\n            h('button',{onClick:()=>this.h_genCheck(false),style:checkBtn(C.warn)},'Noch nicht'));\n      body=h('div',{style:{marginTop:'22px',display:'flex',flexDirection:'column',gap:'16px'}},\n        this.stepsList(task.steps, task.steps.length, dcur),\n        this.answerBox(task, dcur),\n        selfCheck);\n    }\n\n    return h('div',null,\n      controls,\n      h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'12px',flexWrap:'wrap'}},\n        this.diffPill(st.diff),\
